<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0a"/>

  <!-- Decorative circles (right side) -->
  <circle cx="1080" cy="315" r="340" fill="none" stroke="#D42B2B" stroke-width="1.5" opacity="0.12"/>
  <circle cx="1080" cy="315" r="240" fill="none" stroke="#D42B2B" stroke-width="1" opacity="0.08"/>
  <circle cx="1080" cy="315" r="140" fill="none" stroke="#D42B2B" stroke-width="1" opacity="0.06"/>

  <!-- Left red accent bar -->
  <rect width="7" height="630" fill="#D42B2B"/>

  <!-- Top red line -->
  <rect y="0" width="1200" height="3" fill="#D42B2B"/>

  <!-- IDEAL CAR main title -->
  <text x="80" y="295"
    font-family="'Arial Black', 'Arial Bold', Arial, sans-serif"
